<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ShadowTED - TED Talk Shadowing Practice</title>
    <meta name="description" content="Master any TED Talk, one sentence at a time.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
    <link rel="manifest" href="manifest.json">
    <meta property="og:image" content="assets/icon-512.png">
</head>

<body>

    <!-- HEADER -->
    <header id="header">
        <div class="logo">
            <span class="logo-shadow">Shadow</span><span class="logo-ted">TED</span>
        </div>
        <p class="tagline">Master any TED Talk, one sentence at a time</p>
    </header>

    <!-- GIST LOAD -->
    <section id="gist-section">
        <div class="gist-load-wrap">
            <svg class="gist-icon" viewBox="0 0 24 24" width="18" height="18"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" fill="currentColor"/></svg>
            <input type="text" id="gist-url-input" placeholder="Load from Gist URL..." autocomplete="off" spellcheck="false">
            <button id="gist-load-btn" class="gist-load-btn">Load</button>
        </div>
        <div id="gist-token-row" class="gist-token-row">
            <input type="password" id="gist-token" placeholder="GitHub Token (for save)" autocomplete="off">
            <button id="gist-token-save" class="gist-token-btn">💾</button>
        </div>
    </section>

    <!-- UPLOAD SECTION -->
    <section id="upload-section">
        <div class="video-source-area">
            <div class="upload-card" id="upload-video-card">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path
                            d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"
                            fill="currentColor" />
                    </svg>
                </div>
                <div class="upload-info">
                    <span class="upload-title">Upload Video / Audio</span>
                    <span class="upload-hint">MP4 or MP3 file</span>
                </div>
                <input type="file" id="video-file" accept="video/mp4,video/*,audio/mpeg,audio/mp3,audio/*" hidden>
            </div>
            <div class="or-divider"><span>or</span></div>
            <div class="youtube-input-wrap">
                <svg class="yt-icon" viewBox="0 0 24 24" width="20" height="20"><path d="M21.8 8.001a2.749 2.749 0 0 0-1.935-1.946C18.165 5.6 12 5.6 12 5.6s-6.165 0-7.865.455A2.749 2.749 0 0 0 2.2 8.001C1.75 9.708 1.75 12 1.75 12s0 2.292.45 3.999a2.749 2.749 0 0 0 1.935 1.946c1.7.455 7.865.455 7.865.455s6.165 0 7.865-.455a2.749 2.749 0 0 0 1.935-1.946c.45-1.707.45-3.999.45-3.999s0-2.292-.45-3.999zM9.75 15.02V8.98L15.5 12l-5.75 3.02z" fill="#ff0000"/></svg>
                <input type="text" id="youtube-url" placeholder="Paste YouTube link here..." autocomplete="off" spellcheck="false">
            </div>
        </div>

        <div class="upload-card" id="upload-txt-card">
            <div class="upload-icon">
                <svg viewBox="0 0 24 24" width="32" height="32">
                    <path
                        d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"
                        fill="currentColor" />
                </svg>
            </div>
            <div class="upload-info">
                <span class="upload-title">Upload Transcript (.txt)</span>
                <span class="upload-hint">or paste below ↓</span>
            </div>
            <input type="file" id="txt-file" accept=".txt,text/plain" hidden>
        </div>

        <div class="paste-area">
            <textarea id="paste-input"
                placeholder="Or paste transcript here...&#10;&#10;00:00:04&#10;Are there any other parents here&#10;&#10;00:00:06&#10;who have struggled to get your kids out?"></textarea>
        </div>

        <div class="button-row">
            <button id="start-btn" class="start-btn" disabled>
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M8 5v14l11-7z" fill="currentColor" />
                </svg>
                <span>Start Shadowing</span>
            </button>
            <button id="recommend-btn" class="recommend-btn">
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                        fill="currentColor" />
                </svg>
                Recommendations
            </button>
        </div>

        <div id="upload-feedback" class="hidden"></div>
    </section>

    <!-- WORKSPACE -->
    <main id="workspace" class="hidden">
        <div id="toolbar">
            <button id="back-btn" class="toolbar-btn">
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor" />
                </svg>
                <span>Back</span>
            </button>
            <button id="toggle-video-btn" class="toolbar-btn">
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <path
                        d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"
                        fill="currentColor" />
                </svg>
                <span id="toggle-video-text">Hide Video</span>
            </button>
            <button id="save-gist-btn" class="toolbar-btn gist-save">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" fill="currentColor"/></svg>
                <span>Save to Gist</span>
            </button>
        </div>

        <div id="player-panel">
            <div id="player-container">
                <video id="video-player" playsinline></video>
                <div id="youtube-player-wrap" class="hidden"><div id="youtube-player"></div></div>
            </div>
            <div id="player-meta">
                <div class="meta-left">
                    <span class="meta-label">Sentence</span>
                    <span id="sentence-counter">1 / 0</span>
                </div>
                <div class="meta-right">
                    <span id="group-indicator"></span>
                </div>
            </div>
        </div>

        <div id="sentence-panel">
            <div id="sentence-controls">
                <span class="control-label">Sentences</span>
                <div class="group-stepper">
                    <button id="group-dec" class="stepper-btn" disabled><svg viewBox="0 0 24 24" width="16" height="16">
                            <path d="M19 13H5v-2h14v2z" fill="currentColor" />
                        </svg></button>
                    <span id="group-size-display">1</span>
                    <button id="group-inc" class="stepper-btn"><svg viewBox="0 0 24 24" width="16" height="16">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor" />
                        </svg></button>
                </div>
            </div>
            <div id="playback-settings" style="display: flex; gap: 12px; margin-bottom: 12px; padding: 0 16px;">
                <div class="setting-group" style="display: flex; flex-direction: column; gap: 4px; flex: 1;">
                    <label for="speed-setting" class="control-label" style="margin: 0;">Speed</label>
                    <select id="speed-setting" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 6px 8px; font-family: Inter, sans-serif; font-size: 14px; outline: none; cursor: pointer;">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1.0" selected>1.0x (Normal)</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                    </select>
                </div>
                <div class="setting-group" style="display: flex; flex-direction: column; gap: 4px; flex: 1;">
                    <label for="early-start-setting" class="control-label" style="margin: 0;">Start Early</label>
                    <select id="early-start-setting" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 6px 8px; font-family: Inter, sans-serif; font-size: 14px; outline: none; cursor: pointer;">
                        <option value="0" selected>0 ms (Exact)</option>
                        <option value="0.1">-100 ms</option>
                        <option value="0.2">-200 ms</option>
                        <option value="0.5">-500 ms</option>
                        <option value="1.0">-1 sec</option>
                    </select>
                </div>
            </div>
            <div id="sentence-list"></div>
        </div>
    </main>

    <!-- TOUCH CONTROLS -->
    <div id="touch-controls" class="hidden">
        <button id="touch-prev" class="touch-btn"><svg viewBox="0 0 24 24" width="22" height="22">
                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor" />
            </svg></button>
        <button id="touch-play" class="touch-btn primary"><svg viewBox="0 0 24 24" width="26" height="26">
                <path d="M8 5v14l11-7z" fill="currentColor" />
            </svg></button>
        <button id="touch-replay" class="touch-btn"><svg viewBox="0 0 24 24" width="22" height="22">
                <path
                    d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"
                    fill="currentColor" />
            </svg></button>
        <button id="touch-next" class="touch-btn"><svg viewBox="0 0 24 24" width="22" height="22">
                <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" fill="currentColor" />
            </svg></button>
    </div>

    <!-- SHORTCUT BAR -->
    <footer id="shortcut-bar" class="hidden">
        <div class="shortcut-item"><kbd>Space</kbd><span>Replay</span></div>
        <div class="shortcut-item"><kbd>S</kbd><span>Play</span></div>
        <div class="shortcut-item"><kbd>N</kbd><span>Next</span></div>
        <div class="shortcut-item"><kbd>A</kbd><span>Previous</span></div>
        <div class="shortcut-item"><kbd>R</kbd><span>Replay</span></div>
        <div class="shortcut-item"><kbd>+</kbd><kbd>−</kbd><span>Group</span></div>
    </footer>

    <script src="js/state.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/recommendations.js"></script>
    <script src="js/gist.js"></script>
    <script src="js/app.js"></script>
    <script src="https://www.youtube.com/iframe_api" async></script>
</body>

</html>
